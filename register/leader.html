<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e27">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="../manifest.json">
<title>Registro de Lider - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../assets/css/theme.css">
<script src="../assets/js/cache-buster.js"></script>
<script src="../assets/js/loader.js"></script>
<script>AHLoader.init({ role: 'public', pageScript: '../assets/js/pages/register-leader.js' });</script>
</head>
<body class="min-h-screen flex items-center justify-center px-4 bg-ah-bg text-ah-text" data-role="public">

<div id="loading-state" class="text-center">
<div class="text-4xl mb-4">&#9203;</div>
<p class="text-ah-muted">Verificando tu invitacion...</p>
</div>

<div id="error-state" class="hidden text-center max-w-md">
<div class="text-4xl mb-4">&#128683;</div>
<h2 class="text-xl font-bold text-red-400 mb-2">Invitacion no valida</h2>
<p id="error-msg" class="text-ah-muted mb-4">El codigo de invitacion no existe, ya fue usado o expiro.</p>
<a href="../index.html" class="text-sm font-bold text-ah-accent hover:text-ah-accent/80">&larr; Volver al inicio</a>
</div>

<div id="signup-form-state" class="hidden w-full max-w-md">
<div class="rounded-2xl p-8 bg-ah-card border border-ah-border">
<div class="text-center mb-6">
<div class="text-4xl mb-3">&#127941;</div>
<h1 class="text-2xl font-bold text-white">Bienvenido Lider!</h1>
<p class="text-sm text-ah-muted mt-1">Tu solicitud para liderar <strong id="alliance-name-display" class="text-ah-accent"></strong> fue aprobada.</p>
</div>

<form id="leader-signup-form" class="space-y-4">
<div>
<label class="block text-xs font-medium mb-1 text-ah-muted">ID de Jugador</label>
<input type="text" id="ls-player-id" readonly class="w-full px-4 py-3 rounded-lg border text-sm bg-ah-bg border-ah-border text-ah-muted">
</div>
<div>
<label class="block text-xs font-medium mb-1 text-ah-muted">Nombre de Usuario</label>
<input type="text" id="ls-username" readonly class="w-full px-4 py-3 rounded-lg border text-sm bg-ah-bg border-ah-border text-ah-muted">
</div>
<div>
<label class="block text-xs font-medium mb-1 text-ah-muted">Alianza</label>
<input type="text" id="ls-alliance" readonly class="w-full px-4 py-3 rounded-lg border text-sm bg-ah-bg border-ah-border text-ah-muted">
</div>
<div>
<label class="block text-xs font-medium mb-1 text-ah-muted">Email *</label>
<input type="email" id="ls-email" required class="w-full px-4 py-3 rounded-lg border text-sm min-h-[48px] bg-ah-bg border-ah-border text-ah-text focus:border-ah-accent outline-none" placeholder="tu@email.com">
</div>
<div>
<label class="block text-xs font-medium mb-1 text-ah-muted">Contrasena *</label>
<input type="password" id="ls-password" required minlength="6" class="w-full px-4 py-3 rounded-lg border text-sm min-h-[48px] bg-ah-bg border-ah-border text-ah-text focus:border-ah-accent outline-none" placeholder="Minimo 6 caracteres">
</div>
<input type="hidden" id="ls-invite-code">
<input type="hidden" id="ls-supremacy-id">

<div id="form-error" class="hidden text-sm text-red-400 text-center"></div>

<button type="submit" class="w-full py-3 rounded-lg font-bold text-sm min-h-[48px] bg-gradient-to-r from-green-600 to-green-500 text-white hover:opacity-90 transition">
Crear Cuenta de Lider
</button>
</form>

<p class="text-xs text-center mt-4 text-ah-muted">
Ya tienes cuenta? <a href="../login.html" class="text-ah-accent hover:text-ah-accent/80">Inicia sesion aqui</a>
</p>
</div>
</div>

</body>
</html>
