<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e27">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.json">
<title>Reportar Jugador - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/theme.css">
<script src="assets/js/cache-buster.js"></script>
<script src="assets/js/loader.js"></script>
<script>
AHLoader.init({
    role: 'public',
    extraScripts: ['assets/js/storage-utils.js'],
    pageScript: 'assets/js/pages/report.js'
});
</script>
<style>
body{font-family:'Inter',system-ui,sans-serif;background:#0a0e27;color:#e8eaf6;}
#evidence-dropzone{border:2px dashed #1a237e;border-radius:12px;padding:16px;text-align:center;transition:all .2s;cursor:pointer;background:rgba(255,255,255,0.02);}
#evidence-dropzone.dragover{border-color:#ff6f00;background:rgba(255,111,0,0.05);}
.evidence-preview-item{position:relative;border-radius:8px;overflow:hidden;border:1px solid #1a237e;}
.evidence-preview-item .remove-btn{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(198,40,40,0.9);color:#fff;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body class="min-h-screen bg-ah-bg text-ah-text" data-role="public">
<div id="admin-nav"></div>
<div class="max-w-2xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">&#128680; Reportar Jugador</h1>
<p class="text-sm mb-6 text-ah-muted">Reporta una infraccion del reglamento. Selecciona la seccion de la regla que fue violada y adjunta evidencia (imagenes o videos).</p>
<div id="error-banner" class="hidden mb-4 p-3 rounded-lg text-sm font-bold bg-red-500/15 text-red-400"></div>
<div id="success-msg" class="hidden mb-4 p-3 rounded-lg text-sm font-bold bg-green-500/15 text-green-500"></div>
<form id="report-form" class="space-y-4">
<div><label class="block text-sm font-medium mb-1 text-ah-muted">ID del jugador reportado *</label><input type="number" id="r-player-id" required class="w-full px-3 py-2 rounded-lg text-sm min-h-[44px] ah-input" placeholder="Ej: 24549130"></div>
<div><label class="block text-sm font-medium mb-1 text-ah-muted">Seccion del reglamento violada *</label><select id="r-rule" required class="w-full px-3 py-2 rounded-lg text-sm min-h-[44px] ah-input"><option value="">Seleccionar seccion...</option></select></div>
<div><label class="block text-sm font-medium mb-1 text-ah-muted">Descripcion de la infraccion *</label><textarea id="r-desc" rows="4" required class="w-full px-3 py-2 rounded-lg text-sm ah-input" placeholder="Describe lo que ocurrio..."></textarea></div>

<!-- EVIDENCE UPLOAD -->
<div>
    <label class="block text-sm font-medium mb-1 text-ah-muted">Evidencia (imagenes o videos)</label>
    <div id="evidence-dropzone" onclick="document.getElementById('evidence-input').click()">
        <div class="text-3xl mb-2">&#128247;</div>
        <p class="text-sm text-ah-muted">Arrastra archivos aqui o <strong class="text-amber-400">haz clic para seleccionar</strong></p>
        <p class="text-xs mt-1 text-ah-muted">Max 3 archivos. Imagenes (PNG, JPG, WebP) y videos (MP4). Max 5MB cada uno.</p>
        <input type="file" id="evidence-input" class="hidden" accept="image/*,video/*" multiple onchange="handleEvidenceSelect(this.files)">
    </div>
    <div id="evidence-preview" class="grid grid-cols-3 gap-2 mt-3"></div>
    <p id="evidence-status" class="text-xs mt-1 hidden text-ah-muted"></p>
</div>

<button type="submit" id="submit-btn" class="w-full py-3 rounded-lg font-bold text-sm transition active:scale-[0.98] min-h-[48px] gradient-btn">&#128680; Enviar Reporte</button>
</form>
</div>
</body>
</html>
