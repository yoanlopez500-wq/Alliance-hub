<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Solicitar Liderazgo - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/theme.css">
<script src="assets/js/cache-buster.js"></script>
<script src="assets/js/loader.js"></script>
<script>AHLoader.init({ role: 'public', pageScript: 'assets/js/pages/apply-leader.js' });</script>
<meta name="theme-color" content="#0a0e27">
</head>
<body class="min-h-screen bg-ah-bg text-ah-text" data-role="public">
<div id="admin-nav"></div>
<div class="max-w-2xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">&#127941; Solicitar Liderazgo de Alianza</h1>
<p class="text-sm mb-6 text-ah-muted">Completa el formulario para registrar tu alianza en Alliance Hub. Un superadmin revisara tu solicitud.</p>

<div id="error-banner" class="hidden mb-4 p-3 rounded-lg text-sm font-bold bg-red-500/15 text-red-400"></div>
<div id="success-msg" class="hidden mb-4 p-3 rounded-lg text-sm font-bold bg-green-500/15 text-green-400"></div>

<div id="status-card" class="hidden mb-6"></div>

<div id="form-container">
<form id="leader-form" class="space-y-4">
<div>
<label class="block text-sm font-medium mb-1 text-ah-muted">Nombre de la Alianza *</label>
<input type="text" id="alliance-name" required class="w-full px-3 py-2 rounded-lg border text-sm bg-ah-card border-ah-border text-ah-text focus:border-ah-accent outline-none" placeholder="Ej: Los Guerreros Aguilas">
</div>
<div>
<label class="block text-sm font-medium mb-1 text-ah-muted">Tag (abreviatura) *</label>
<input type="text" id="alliance-tag" required maxlength="10" class="w-full px-3 py-2 rounded-lg border text-sm uppercase bg-ah-card border-ah-border text-ah-text focus:border-ah-accent outline-none" placeholder="Ej: LGA">
</div>
<div>
<label class="block text-sm font-medium mb-1 text-ah-muted">Descripcion</label>
<textarea id="alliance-desc" rows="3" class="w-full px-3 py-2 rounded-lg border text-sm bg-ah-card border-ah-border text-ah-text focus:border-ah-accent outline-none" placeholder="Describe tu alianza, sus objetivos y reglas internas..."></textarea>
</div>
<div>
<label class="block text-sm font-medium mb-1 text-ah-muted">Tu ID de Supremacy 1914 *</label>
<input type="number" id="supremacy-id" required class="w-full px-3 py-2 rounded-lg border text-sm bg-ah-card border-ah-border text-ah-text focus:border-ah-accent outline-none" placeholder="Ej: 24549130">
</div>
<div>
<label class="block text-sm font-medium mb-1 text-ah-muted">Tu nombre de usuario en Supremacy *</label>
<input type="text" id="username" required class="w-full px-3 py-2 rounded-lg border text-sm bg-ah-card border-ah-border text-ah-text focus:border-ah-accent outline-none" placeholder="Ej: Tlaloc27">
</div>
<div>
<label class="block text-sm font-medium mb-1 text-ah-muted">Discord (opcional)</label>
<input type="text" id="discord" class="w-full px-3 py-2 rounded-lg border text-sm bg-ah-card border-ah-border text-ah-text focus:border-ah-accent outline-none" placeholder="usuario#1234">
</div>
<div>
<label class="block text-sm font-medium mb-1 text-ah-muted">Numero aproximado de miembros</label>
<input type="number" id="member-count" min="1" class="w-full px-3 py-2 rounded-lg border text-sm bg-ah-card border-ah-border text-ah-text focus:border-ah-accent outline-none" placeholder="Ej: 10">
</div>
<div class="flex items-start gap-2">
<input type="checkbox" id="accept-rules" required class="mt-1">
<label for="accept-rules" class="text-sm text-ah-muted">He leido y acepto el <a href="rules.html" class="underline text-ah-accent">reglamento de Alliance Hub</a> y me comprometo a hacerlo cumplir en mi alianza. *</label>
</div>
<button type="submit" id="submit-btn" class="w-full py-3 rounded-lg font-bold text-sm transition active:scale-[0.98] gradient-btn">&#128232; Enviar Solicitud</button>
</form>
</div>
</div>
</body>
</html>
