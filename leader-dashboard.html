<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Panel de Lider - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="assets/css/theme.css">
<script src="assets/js/cache-buster.js"></script>
<script src="assets/js/loader.js"></script>
<script>AHLoader.init({ role: 'admin', pageScript: 'assets/js/pages/leader-dashboard.js' });</script>
<meta name="theme-color" content="#0a0e27">
</head>
<body class="min-h-screen bg-ah-bg text-ah-text" data-role="alliance_leader">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-6">
<div id="alliance-header" class="mb-6 fade-in">
<div class="flex flex-wrap items-center gap-4 mb-2">
<div class="w-14 h-14 rounded-xl flex items-center justify-center text-2xl font-bold bg-gradient-to-br from-indigo-900 to-indigo-800">&#127988;</div>
<div class="flex-1">
<h1 class="text-2xl font-bold text-white" id="alliance-name">Cargando...</h1>
<p class="text-sm text-ah-muted" id="alliance-tag">--</p>
</div>
<div class="flex gap-2 flex-wrap">
<a href="admin/duel-manager.html" class="px-4 py-2 rounded-lg text-sm font-bold transition active:scale-[0.98] gradient-btn">&#9876;&#65039; Preparar Duelo</a>
<a href="admin/matches.html" class="px-4 py-2 rounded-lg text-sm font-bold transition active:scale-[0.98] border border-ah-border bg-white/5 text-ah-text">&#10133; Nueva Partida</a>
</div>
</div>
</div>
<div class="flex gap-6 mb-6 border-b border-ah-border overflow-x-auto scrollbar-hide">
<button id="tab-members" class="pb-3 text-sm font-medium whitespace-nowrap transition border-b-2 border-ah-accent text-ah-accent">&#128101; Miembros</button>
<button id="tab-requests" class="pb-3 text-sm font-medium whitespace-nowrap transition border-b-2 border-transparent text-ah-muted">&#128233; Solicitudes <span id="req-badge" class="hidden px-1.5 py-0.5 rounded text-xs font-bold ml-1 bg-red-500/30 text-red-400">0</span></button>
<button id="tab-rankings" class="pb-3 text-sm font-medium whitespace-nowrap transition border-b-2 border-transparent text-ah-muted">&#127942; Rankings</button>
<button id="tab-duels" class="pb-3 text-sm font-medium whitespace-nowrap transition border-b-2 border-transparent text-ah-muted">&#9876;&#65039; Duelos</button>
<button id="tab-matches" class="pb-3 text-sm font-medium whitespace-nowrap transition border-b-2 border-transparent text-ah-muted">&#127918; Partidas</button>
</div>
<div id="panel-members" class="fade-in">
<div class="grid gap-3" id="members-list"><div class="text-center py-8 text-ah-muted">Cargando miembros...</div></div>
</div>
<div id="panel-requests" class="hidden fade-in">
<div id="requests-list"><div class="text-center py-8 text-ah-muted">Cargando solicitudes...</div></div>
</div>
<div id="panel-rankings" class="hidden fade-in">
<div id="rankings-list"><div class="text-center py-8 text-ah-muted">Cargando rankings...</div></div>
</div>
<div id="panel-duels" class="hidden fade-in">
<div id="duels-list"><div class="text-center py-8 text-ah-muted">Cargando duelos...</div></div>
</div>
<div id="panel-matches" class="hidden fade-in">
<div id="matches-list"><div class="text-center py-8 text-ah-muted">Cargando partidas...</div></div>
</div>
</div>
</body>
</html>
