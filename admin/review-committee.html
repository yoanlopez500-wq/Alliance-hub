<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Comite de Revision - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../assets/css/theme.css">
<script src="../assets/js/cache-buster.js"></script>
<script src="../assets/js/loader.js"></script>
<script>
AHLoader.init({
    role: 'admin',
    extraScripts: ['../assets/js/admin-base.js'],
    pageScript: '../assets/js/pages/admin-review-committee.js'
});
</script>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>

<div class="max-w-6xl mx-auto px-4 py-6">
<div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 gap-3">
<div>
<h1 class="text-2xl font-bold">&#128736;&#65039; Comite de Revision</h1>
<p class="text-sm" style="color:#9fa8da;">Aprobar o rechazar strikes con nuevos precedentes propuestos.</p>
</div>
<div id="role-badge" class="text-xs px-3 py-1 rounded-full font-bold" style="background:#1a237e;color:#9fa8da;">...</div>
</div>

<!-- Stats -->
<div class="grid grid-cols-3 gap-3 mb-6">
<div class="rounded-xl p-4 text-center" style="background:#11183a;border:1px solid #1a237e;">
<div class="text-2xl font-bold" style="color:#ff8f00;" id="stat-pending">0</div>
<div class="text-xs" style="color:#9fa8da;">Pendientes</div>
</div>
<div class="rounded-xl p-4 text-center" style="background:#11183a;border:1px solid #1a237e;">
<div class="text-2xl font-bold" style="color:#4caf50;" id="stat-approved">0</div>
<div class="text-xs" style="color:#9fa8da;">Aprobados (hoy)</div>
</div>
<div class="rounded-xl p-4 text-center" style="background:#11183a;border:1px solid #1a237e;">
<div class="text-2xl font-bold" style="color:#ef5350;" id="stat-rejected">0</div>
<div class="text-xs" style="color:#9fa8da;">Rechazados (hoy)</div>
</div>
</div>

<!-- Tabs -->
<div class="flex gap-6 mb-6 border-b" style="border-color:#1a237e;">
<button id="tab-pending-btn" onclick="switchTab('pending')" class="pb-3 text-sm font-bold transition tab-active" style="border-bottom:2px solid #ff6f00;color:#ff8f00;">&#9203; Pendientes</button>
<button id="tab-history-btn" onclick="switchTab('history')" class="pb-3 text-sm font-bold transition tab-inactive" style="border-bottom:2px solid transparent;color:#9fa8da;">&#128203; Historial</button>
</div>

<!-- Pending Tab -->
<div id="tab-pending">
<div id="pending-list">Cargando...</div>
</div>

<!-- History Tab -->
<div id="tab-history" class="hidden">
<div id="history-list">Cargando...</div>
</div>
</div>

<!-- Aprove/Reject Modal -->
<div id="action-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center" style="background:rgba(0,0,0,0.7);">
<div class="rounded-xl p-6 w-full max-w-lg mx-4" style="background:#fff;color:#0f172a;">
<h3 id="action-title" class="text-lg font-bold mb-4">Aprobar Strike</h3>
<input type="hidden" id="action-strike-id">
<input type="hidden" id="action-type">
<div class="mb-3">
<label class="block text-sm font-medium mb-1">Precedente a vincular (opcional)</label>
<select id="action-precedent" class="w-full px-3 py-2 rounded-lg border text-sm" style="background:#fff;border-color:#cbd5e1;color:#0f172a;">
<option value="">Crear nuevo precedente...</option>
</select>
</div>
<div class="mb-4">
<label class="block text-sm font-medium mb-1">Comentario del comite</label>
<textarea id="action-comment" rows="3" class="w-full px-3 py-2 rounded-lg border text-sm" style="background:#fff;border-color:#cbd5e1;color:#0f172a;" placeholder="Razon de la decision..."></textarea>
</div>
<div class="flex gap-2 justify-end">
<button onclick="closeActionModal()" class="px-4 py-2 rounded-lg text-sm font-bold" style="background:#e2e8f0;color:#0f172a;">Cancelar</button>
<button onclick="confirmAction()" id="action-confirm-btn" class="px-4 py-2 rounded-lg text-sm font-bold text-white">Confirmar</button>
</div>
</div></div>

</body>
</html>
