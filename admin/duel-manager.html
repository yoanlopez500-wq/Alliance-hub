<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Duel Manager - Alliance Hub</title>
<link rel="stylesheet" href="../assets/css/theme.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="../assets/js/cache-buster.js"></script>
<script src="../assets/js/loader.js"></script>
<script>
AHLoader.init({
    role: 'admin',
    extraScripts: ['../assets/js/admin-base.js'],
    pageScript: '../assets/js/pages/admin-duel-manager.js'
});
</script>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<h1 class="text-2xl font-bold mb-2">&#9876;&#65039; Duel Manager</h1>
<p class="text-sm mb-6" style="color:#9fa8da;">Prepara equipos de 5 jugadores y desafia a otras alianzas.</p>
<div class="grid md:grid-cols-2 gap-6">
<div class="rounded-xl p-5" style="background:#11183a;border:1px solid #1a237e;">
<h2 class="text-lg font-bold mb-3">Tu Alianza</h2>
<select id="my-alliance" class="w-full px-3 py-2 rounded-lg border text-sm mb-3" onchange="loadMyPlayers()"><option value="">Seleccionar alianza...</option></select>
<div id="my-players" class="space-y-2 max-h-64 overflow-y-auto"></div>
</div>
<div class="rounded-xl p-5" style="background:#11183a;border:1px solid #1a237e;">
<h2 class="text-lg font-bold mb-3">Rival</h2>
<select id="rival-alliance" class="w-full px-3 py-2 rounded-lg border text-sm mb-3"><option value="">Seleccionar rival...</option></select>
<div class="flex gap-2 mt-4"><button onclick="createDuel()" class="flex-1 py-2 rounded-lg text-sm font-bold" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;">&#9876;&#65039; Desafiar</button></div>
</div>
</div>
<div class="mt-6"><h2 class="text-lg font-bold mb-3">Equipo Seleccionado (<span id="team-count">0</span>/5)</h2>
<div id="selected-team" class="flex gap-2 flex-wrap"></div>
<button onclick="saveTeam()" id="save-team-btn" class="mt-3 px-4 py-2 rounded-lg text-sm font-bold" style="background:#1a237e;color:#e8eaf6;" disabled>&#128190; Guardar Equipo</button>
</div>
</div>
</body>
</html>
