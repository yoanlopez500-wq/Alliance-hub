<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Game Detail - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../assets/css/theme.css">
<script src="../assets/js/cache-buster.js"></script>
<script src="../assets/js/loader.js"></script>
<script>
AHLoader.init({
    role: 'admin',
    extraScripts: ['../assets/js/admin-base.js'],
    pageScript: '../assets/js/pages/admin-game-detail.js'
});
</script>
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-6xl mx-auto px-4 py-8">
<div id="game-header">Cargando...</div>
<div id="game-form" class="hidden mt-6">
<div class="rounded-xl p-6" style="background:#11183a;border:1px solid #1a237e;">
<h2 class="text-xl font-bold mb-4">&#9998; Editar Game</h2>
<div class="grid md:grid-cols-2 gap-4 mb-4">
<div><label class="block text-sm mb-1" style="color:#9fa8da;">Nombre *</label><input type="text" id="g-name" class="w-full px-3 py-2 rounded-lg border text-sm"></div>
<div><label class="block text-sm mb-1" style="color:#9fa8da;">Alianza</label><select id="g-alliance" class="w-full px-3 py-2 rounded-lg border text-sm"><option value="">Seleccionar...</option></select></div>
</div>
<div class="grid md:grid-cols-2 gap-4 mb-4">
<div><label class="block text-sm mb-1" style="color:#9fa8da;">Estado</label><select id="g-status" class="w-full px-3 py-2 rounded-lg border text-sm"><option value="draft">Borrador</option><option value="open">Abierta</option><option value="in_progress">En curso</option><option value="finished">Finalizada</option></select></div>
<div><label class="block text-sm mb-1" style="color:#9fa8da;">Tipo</label><select id="g-type" class="w-full px-3 py-2 rounded-lg border text-sm"><option value="internal">Interna</option><option value="duel">Duelo</option><option value="public_31">Publica 31</option><option value="public_500">Evento 500</option></select></div>
</div>
<div class="mb-4"><label class="block text-sm mb-1" style="color:#9fa8da;">URL del PDF de reglas (opcional)</label><input type="url" id="g-rules-url" class="w-full px-3 py-2 rounded-lg border text-sm" placeholder="https://drive.google.com/..."></div>
<div class="flex gap-2"><button onclick="saveGame()" class="px-4 py-2 rounded-lg text-sm font-bold" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;">Guardar</button><button onclick="cancelEdit()" class="px-4 py-2 rounded-lg text-sm font-bold" style="background:#1a237e;color:#e8eaf6;">Cancelar</button></div>
</div></div>
</div>
</body>
</html>
