<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Alianzas - Alliance Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../assets/css/theme.css">
<script src="../assets/js/cache-buster.js"></script>
<script src="../assets/js/loader.js"></script>
<script>
AHLoader.init({
    role: 'admin',
    extraScripts: ['../assets/js/admin-base.js'],
    pageScript: '../assets/js/pages/admin-alliances.js'
});
</script>
<meta name="theme-color" content="#0a0e27">
</head>
<body class="min-h-screen" data-role="admin">
<div id="admin-nav"></div>
<div class="max-w-7xl mx-auto px-4 py-8">
<div class="flex items-center justify-between mb-6">
<h1 class="text-2xl font-bold">&#127988; Alianzas</h1>
<button onclick="openModal()" class="px-4 py-2 rounded-lg font-bold text-sm gradient-btn">&#10133; Nueva Alianza</button>
</div>
<div id="alliances-list" class="space-y-3"><div class="text-center py-8 text-ah-muted">Cargando...</div></div>
</div>

<div id="alliance-modal" class="modal">
<div class="rounded-xl p-6 max-w-md w-full mx-4 max-h-[90vh] overflow-y-auto bg-ah-card border border-indigo-900">
<h2 id="modal-title" class="text-xl font-bold mb-4">Nueva Alianza</h2>
<input type="hidden" id="edit-id">
<div class="mb-3"><label class="block text-sm mb-1 text-ah-muted">Nombre *</label><input type="text" id="alliance-name" class="w-full px-3 py-2 rounded-lg border text-sm bg-ah-card text-ah-text border-indigo-900"></div>
<div class="mb-3"><label class="block text-sm mb-1 text-ah-muted">Tag (2-10 caracteres) *</label><input type="text" id="alliance-tag" class="w-full px-3 py-2 rounded-lg border text-sm bg-ah-card text-ah-text border-indigo-900"></div>
<div class="mb-3"><label class="block text-sm mb-1 text-ah-muted">Descripcion</label><textarea id="alliance-desc" class="w-full px-3 py-2 rounded-lg border text-sm bg-ah-card text-ah-text border-indigo-900" rows="3"></textarea></div>
<div class="flex gap-2 justify-end"><button onclick="closeModal()" class="px-4 py-2 rounded-lg text-sm font-bold bg-indigo-900 text-slate-100">Cancelar</button><button onclick="saveAlliance()" class="px-4 py-2 rounded-lg text-sm font-bold gradient-btn">Guardar</button></div>
</div></div>
</body>
</html>
