<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Alliance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/theme.css">
    <script src="../assets/js/cache-buster.js"></script>
    <script src="../assets/js/loader.js"></script>
    <script>
    AHLoader.init({
        role: 'admin',
        extraScripts: ['../assets/js/admin-base.js'],
        pageScript: '../assets/js/pages/admin-chat.js'
    });
    </script>
    <meta name="theme-color" content="#0f172a">
</head>
<body style="background:#0a0e27;color:#e8eaf6;min-height:100vh;" data-role="admin">
    <div id="admin-nav"></div>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold mb-6">&#128172; Chat Global</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- Canales -->
            <div class="rounded-xl p-4" style="background:#11183a;border:1px solid #1a237e;">
                <h3 class="font-bold mb-3">Canales</h3>
                <div id="channel-list" class="space-y-1">
                    <button onclick="switchChannel('general')" class="w-full text-left px-3 py-2 rounded-lg text-sm font-medium" style="background:rgba(255,143,0,0.15);color:#ff8f00;" data-channel="general"># general</button>
                    <button onclick="switchChannel('anuncios')" class="w-full text-left px-3 py-2 rounded-lg text-sm" style="color:#9fa8da;" data-channel="anuncios"># anuncios</button>
                    <button onclick="switchChannel('soporte')" class="w-full text-left px-3 py-2 rounded-lg text-sm" style="color:#9fa8da;" data-channel="soporte"># soporte</button>
                </div>
            </div>

            <!-- Mensajes -->
            <div class="md:col-span-2 rounded-xl border flex flex-col" style="background:#11183a;border-color:#1a237e;height:500px;">
                <div class="p-3" style="border-bottom:1px solid #1a237e;">
                    <h3 id="chat-header" class="font-bold"># general</h3>
                </div>
                <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3">
                    <div class="text-center text-sm" style="color:#9fa8da;">Cargando mensajes...</div>
                </div>
                <div class="p-3" style="border-top:1px solid #1a237e;">
                    <div class="flex gap-2">
                        <input type="text" id="chat-input" onkeypress="if(event.key==='Enter')sendMessage()" class="flex-1 px-3 py-2 rounded-lg border text-sm outline-none" style="background:#0a0e27;border-color:#1a237e;color:#e8eaf6;" placeholder="Escribe un mensaje...">
                        <button onclick="sendMessage()" class="px-4 py-2 rounded-lg font-bold text-sm" style="background:linear-gradient(135deg,#ff6f00,#ff8f00);color:#fff;">Enviar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
